<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Exclusivo - Portal Telemedicina</title>
    <link rel="stylesheet" href="telemedicina.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        body {
            background: url('telemedicina_bg.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .login-tele-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 53, 102, 0.25);
        }

        .logo-area i {
            font-size: 4rem;
            color: #0056AC;
            filter: drop-shadow(0 4px 10px rgba(0, 86, 172, 0.15));
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            color: #003566;
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
            font-weight: 800;
        }

        p {
            color: #475569;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #475569;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 15px;
            border-radius: 12px;
            color: #0f172a;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #00bcd4;
            background: #f8fafc;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.15);
        }

        .btn-login-tele {
            width: 100%;
            background: linear-gradient(135deg, #0056AC 0%, #00bcd4 100%);
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(0, 86, 172, 0.2);
        }

        .btn-login-tele:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 86, 172, 0.35);
            filter: brightness(1.1);
        }

        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 600;
        }

        .footer-links a:hover {
            color: #0056AC;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decoration */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #00bcd4;
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="orb" style="top: -100px; left: -100px;"></div>
    <div class="orb" style="bottom: -100px; right: -100px;"></div>

    <div class="login-tele-container">
        <div class="login-card">
            <div class="logo-area">
                <i class="fi fi-rr-video-camera-alt"></i>
            </div>
            <h1>Acesso Telemedicina</h1>
            <p>Entre no portal exclusivo de atendimento remoto.</p>

            <form id="form-login-tele">
                <div class="input-group">
                    <label>CPF do Profissional ou Paciente</label>
                    <input type="text" id="tele-cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="input-group">
                    <label>Senha de Acesso</label>
                    <input type="password" id="tele-pass" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login-tele">Entrar no Portal</button>
            </form>

            <div class="footer-links">
                <a href="index.html">← Voltar ao site</a>
                <a href="#">Esqueci minha senha</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="api.js?v=20260609-1935"></script>
    <script>
        document.getElementById('form-login-tele').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cpfRaw = document.getElementById('tele-cpf').value;
            const cpf = cpfRaw.replace(/\D/g, ''); // Limpar CPF antes de enviar à API
            const pass = document.getElementById('tele-pass').value;

            if (typeof API === 'undefined') {
                Swal.fire('Erro', 'Sistema de API não carregado.', 'error');
                return;
            }

            try {
                const resp = await API.login(cpf, pass);
                if (resp && resp.sucesso) {
                    const u = resp.usuario;
                    // Armazenar dados da sessão de forma completa e compatível com o resto do site
                    localStorage.setItem('usuarioLogado', 'true');
                    localStorage.setItem('usuarioNome', u.nome);
                    localStorage.setItem('tipoUsuario', (u.tipo || 'paciente').toLowerCase());
                    localStorage.setItem('usuarioCpf', u.cpf);
                    localStorage.setItem('usuarioSUS', u.sus || '');
                    localStorage.setItem('usuarioId', u.id);
                    
                    const tipo = (u.tipo || 'paciente').toLowerCase();
                    if (tipo === 'admin') {
                        localStorage.setItem('adminLogado', 'true');
                    } else if (tipo === 'medico' || tipo === 'medico_tele') {
                        localStorage.setItem('medicoRegistrado', JSON.stringify(u));
                    } else if (tipo === 'enfermeiro') {
                        localStorage.setItem('enfermeiroRegistrado', JSON.stringify(u));
                    }
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Acesso Autorizado',
                        text: `Bem-vindo ao Portal de Telemedicina, ${u.nome}!`,
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'telemedicina.html';
                    });
                } else {
                    Swal.fire('Erro', resp.erro || 'Credenciais inválidas.', 'error');
                }
            } catch (err) {
                Swal.fire('Erro', 'Falha na conexão com o servidor.', 'error');
            }
        });

        // Máscara de CPF simples
        document.getElementById('tele-cpf').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 9) value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            else if (value.length > 6) value = value.replace(/(\d{3})(\d{3})(\d{3})/, "$1.$2.$3");
            else if (value.length > 3) value = value.replace(/(\d{3})(\d{3})/, "$1.$2");
            e.target.value = value;
        });
    </script>
</body>
</html>
