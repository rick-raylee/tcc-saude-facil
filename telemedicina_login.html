<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Exclusivo - Portal Telemedicina</title>
    <link rel="stylesheet" href="telemedicina.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .login-tele-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        .logo-area i {
            font-size: 4rem;
            color: var(--neon-cyan);
            filter: drop-shadow(0 0 10px var(--neon-cyan));
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #64748b;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 255, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .btn-login-tele {
            width: 100%;
            background: var(--neon-cyan);
            color: #020617;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-login-tele:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.4);
            filter: brightness(1.1);
        }

        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--neon-cyan);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decoration */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--neon-cyan);
            filter: blur(150px);
            opacity: 0.05;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="orb" style="top: -100px; left: -100px;"></div>
    <div class="orb" style="bottom: -100px; right: -100px;"></div>

    <div class="login-tele-container">
        <div class="login-card">
            <div class="logo-area">
                <i class="fi fi-rr-video-camera-alt"></i>
            </div>
            <h1>Acesso Telemedicina</h1>
            <p>Entre no portal exclusivo de atendimento remoto.</p>

            <form id="form-login-tele">
                <div class="input-group">
                    <label>CPF do Profissional ou Paciente</label>
                    <input type="text" id="tele-cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="input-group">
                    <label>Senha de Acesso</label>
                    <input type="password" id="tele-pass" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login-tele">Entrar no Portal</button>
            </form>

            <div class="footer-links">
                <a href="index.html">← Voltar ao site</a>
                <a href="#">Esqueci minha senha</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="api.js"></script>
    <script>
        document.getElementById('form-login-tele').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cpf = document.getElementById('tele-cpf').value;
            const pass = document.getElementById('tele-pass').value;

            if (typeof API === 'undefined') {
                Swal.fire('Erro', 'Sistema de API não carregado.', 'error');
                return;
            }

            try {
                const resp = await API.login(cpf, pass);
                if (resp && resp.sucesso) {
                    // Armazenar dados da sessão exclusiva de telemedicina
                    localStorage.setItem('usuarioLogado', 'true');
                    localStorage.setItem('usuarioTipo', resp.usuario.tipo);
                    localStorage.setItem('usuarioNome', resp.usuario.nome);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Acesso Autorizado',
                        text: `Bem-vindo ao Portal de Telemedicina, ${resp.usuario.nome}!`,
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'telemedicina.html';
                    });
                } else {
                    Swal.fire('Erro', resp.erro || 'Credenciais inválidas.', 'error');
                }
            } catch (err) {
                Swal.fire('Erro', 'Falha na conexão com o servidor.', 'error');
            }
        });

        // Máscara de CPF simples
        document.getElementById('tele-cpf').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 9) value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            else if (value.length > 6) value = value.replace(/(\d{3})(\d{3})(\d{3})/, "$1.$2.$3");
            else if (value.length > 3) value = value.replace(/(\d{3})(\d{3})/, "$1.$2");
            e.target.value = value;
        });
    </script>
</body>
</html>
